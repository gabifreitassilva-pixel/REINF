<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha de Integrações - Sistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #f8fafc; }
        table { border-collapse: collapse; width: 100%; table-layout: auto; }
        th, td { font-size: 9px; padding: 2px 4px !important; white-space: nowrap; text-align: center; border: 1px solid #cbd5e1; }
        .col-fixed-razao { width: auto; min-width: 150px; max-width: 250px; text-align: left; overflow: hidden; text-overflow: ellipsis; }
        .col-fixed-cnpj { width: 105px; min-width: 105px; max-width: 105px; font-family: monospace; font-weight: bold; }
        .filter-container { display: flex; flex-direction: column; align-items: center; gap: 2px; width: 100%; margin-top: 2px; }
        .filter-select { font-size: 8px; padding: 0px 1px; width: 100%; max-width: 70px; border: 1px solid #94a3b8; background: white; border-radius: 2px; outline: none; }
        thead { position: sticky; top: 0; z-index: 20; }
        .painel-lateral { transition: transform 0.3s ease-in-out; }
        .painel-oculto { transform: translateX(100%); }
        .cell-input { width: 100%; background: transparent; text-align: center; outline: none; font-weight: bold; font-size: 9px; }
        .linha-selecionada td { background-color: #fed7aa !important; border-top: 2px solid #ea580c !important; border-bottom: 2px solid #ea580c !important; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="font-sans overflow-hidden">

    <div id="modalUser" class="fixed inset-0 bg-slate-900 bg-opacity-80 flex justify-center items-center z-[100] hidden px-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm text-center border-t-4 border-blue-600">
            <h2 class="text-xl font-black mb-2 text-slate-800 uppercase">Acesso ao Sistema</h2>
            <select id="userSelect" onchange="window.checkUserType()" class="w-full border-2 border-slate-200 p-3 rounded-lg mb-4 text-center font-bold text-lg outline-none uppercase bg-slate-50">
                <option value="">SELECIONE SEU NOME...</option>
                <option value="GABRIELA">GABRIELA</option>
                <option value="AMAURI">AMAURI</option>
                <option value="VISITANTE">VISITANTE (APENAS VISUALIZAR)</option>
            </select>
            <input type="password" id="userPasswordInput" class="w-full border-2 border-slate-200 p-3 rounded-lg mb-4 text-center font-bold text-lg hidden" placeholder="SENHA">
            <button onclick="window.salvarUsuario()" class="bg-blue-600 text-white font-black px-6 py-3 rounded-lg w-full uppercase tracking-widest">Entrar</button>
        </div>
    </div>

    <div id="modalGist" class="fixed inset-0 bg-slate-900 bg-opacity-80 flex justify-center items-center z-[100] hidden px-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md text-center border-t-4 border-emerald-600 relative">
            <button onclick="window.fecharModalGist()" class="absolute top-3 right-4 text-slate-400 hover:text-slate-700 text-xl font-bold">&times;</button>
            <h2 class="text-xl font-black mb-4 text-slate-800 uppercase">Conectar com a Nuvem</h2>
            <div class="text-left mb-3">
                <label class="text-[10px] font-black text-slate-600 uppercase">GitHub Token:</label>
                <input type="password" id="gistTokenInput" class="w-full border-2 border-slate-200 p-2 rounded-lg text-sm outline-none">
            </div>
            <div class="text-left mb-5">
                <label class="text-[10px] font-black text-slate-600 uppercase">ID do Gist:</label>
                <input type="text" id="gistIdInput" class="w-full border-2 border-slate-200 p-2 rounded-lg text-sm outline-none">
            </div>
            <button onclick="window.salvarConfigGist()" class="bg-emerald-600 text-white font-black px-6 py-3 rounded-lg w-full uppercase tracking-widest">Salvar e Sincronizar</button>
        </div>
    </div>

    <div class="h-screen flex flex-col relative bg-white">
        <div class="p-3 border-b border-slate-200 flex justify-between items-center bg-slate-50 z-30">
            <h1 class="text-sm font-black text-slate-700 uppercase"><span class="bg-blue-600 text-white p-1 rounded">PI</span> Controle de Integrações</h1>
            <div class="flex items-center gap-2">
                <button onclick="window.abrirModalGist()" id="btnStatusNuvem" class="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-full text-[10px] font-black border border-slate-300 flex items-center gap-1">
                    <span id="iconeNuvem">☁️</span> <span id="textoNuvem">NUVEM</span>
                </button>
                <div class="text-[10px] bg-white px-3 py-1.5 rounded-full border border-slate-200 font-bold flex items-center gap-2">
                    USUÁRIO: <span id="displayUserName" class="text-blue-600 uppercase"></span>
                </div>
                <button onclick="togglePainel('painelCadastro')" class="bg-indigo-100 text-indigo-900 px-4 py-1.5 rounded-full text-[10px] font-black border border-indigo-300">👥 CADASTRO</button>
            </div>
        </div>

        <div class="p-3 bg-blue-50 border-b border-blue-100" id="botoesImportacao">
            <div class="flex gap-4 items-center">
                <input type="text" id="mesRefInput" placeholder="01/2026" class="w-24 border-2 border-blue-200 rounded px-2 py-1 text-xs font-black">
                <textarea id="rawData" rows="1" class="flex-grow border-2 border-blue-100 rounded px-3 py-1 text-xs resize-none" placeholder="Cole os dados aqui..."></textarea>
                <button onclick="adicionarDados()" class="bg-blue-600 text-white text-xs font-black py-2 px-6 rounded uppercase">Processar</button>
            </div>
        </div>

        <div class="overflow-auto flex-grow bg-white">
            <table id="mainTable">
                <thead id="tabelaHead" class="bg-slate-100"></thead>
                <tbody id="tabelaCorpo" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <div id="painelCadastro" class="painel-lateral painel-oculto absolute top-0 right-0 h-full w-96 bg-white shadow-2xl border-l z-50 flex flex-col">
        <div class="p-4 bg-indigo-50 border-b flex justify-between items-center">
            <h2 class="text-sm font-black text-indigo-900 uppercase">Cadastro de Clientes</h2>
            <button onclick="togglePainel('painelCadastro')" class="text-2xl leading-none">&times;</button>
        </div>
        <div class="p-4 overflow-y-auto flex-grow" id="listaCadastro"></div>
    </div>

    <script>
        // ==========================================
        // LÓGICA DE ESTADO E PERSISTÊNCIA
        // ==========================================
        window.appState = {
            meses: [],
            mesesConfig: {},
            clientes: [],
            historicoGeral: [],
            filtros: {},
            currentUser: '',
            passwords: {}
        };

        window.gistConfig = {
            token: localStorage.getItem('reinfGistToken') || '',
            id: localStorage.getItem('reinfGistId') || ''
        };

        // --- MOTOR DE SINCRONIZAÇÃO (CORRIGIDO) ---
        window.salvarNoGist = async function(dados) {
            if (!window.gistConfig.token || !window.gistConfig.id) return;
            try {
                const fileName = "planilha_reinf.json";
                const payload = { files: { [fileName]: { content: JSON.stringify(dados) } } };
                const response = await fetch(`https://api.github.com/gists/${window.gistConfig.id}`, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `Bearer ${window.gistConfig.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                if (response.ok) window.atualizarBotaoNuvem(true);
            } catch(e) { window.atualizarBotaoNuvem(false); }
        };

        window.sincronizarDoGist = async function() {
            if (!window.gistConfig.token || !window.gistConfig.id) return false;
            try {
                const response = await fetch(`https://api.github.com/gists/${window.gistConfig.id}`, {
                    headers: { 'Authorization': `Bearer ${window.gistConfig.token}` }
                });
                if (!response.ok) return false;
                const data = await response.json();
                const content = Object.values(data.files)[0].content;
                if (content) {
                    window.appState = JSON.parse(content);
                    return true;
                }
            } catch(e) { return false; }
        };

        window.saveState = async function() {
            if (window.isVisitante) return;
            localStorage.setItem('reinf_local_backup', JSON.stringify(window.appState));
            await window.salvarNoGist(window.appState);
        };

        // ==========================================
        // FUNCIONALIDADES DA PLANILHA
        // ==========================================
        window.syncUI = function() {
            if (!window.appState.currentUser) {
                document.getElementById('modalUser').classList.remove('hidden');
            } else {
                document.getElementById('displayUserName').innerText = window.appState.currentUser;
                document.getElementById('modalUser').classList.add('hidden');
            }
            window.renderTable();
            window.atualizarBotaoNuvem(!!window.gistConfig.token);
        };

        window.renderTable = function() {
            const thead = document.getElementById('tabelaHead');
            const tbody = document.getElementById('tabelaCorpo');
            
            // Lógica de construção do Header
            let tr1 = `<tr><th rowspan="2" class="col-fixed-razao">RAZÃO SOCIAL</th><th rowspan="2" class="col-fixed-cnpj">CNPJ</th>`;
            let tr2 = `<tr>`;

            window.appState.meses.forEach(mes => {
                if (window.appState.mesesConfig[mes]?.visible !== false) {
                    tr1 += `<th colspan="3" class="bg-blue-100">${mes}</th>`;
                    tr2 += `<th class="bg-blue-50">ANT</th><th class="bg-slate-50">FOLHA</th><th class="bg-white">DECL</th>`;
                }
            });
            thead.innerHTML = tr1 + "</tr>" + tr2 + "</tr>";

            // Lógica de construção do Corpo
            tbody.innerHTML = window.appState.clientes.map(cli => `
                <tr>
                    <td class="col-fixed-razao font-bold uppercase">${cli.razao}</td>
                    <td class="col-fixed-cnpj font-mono">${cli.cnpj}</td>
                    ${window.appState.meses.map(m => {
                        const d = cli.mensal?.[m] || { antec: '-', lancado: '-', reinf: '-' };
                        return `
                            <td class="bg-blue-50 font-bold">${d.antec}</td>
                            <td>${d.lancado}</td>
                            <td>${d.reinf}</td>
                        `;
                    }).join('')}
                </tr>
            `).join('');
        };

        // --- LOGIN E USUÁRIOS ---
        window.salvarUsuario = function() {
            const sel = document.getElementById('userSelect').value;
            if (!sel) return alert("Selecione o usuário!");
            window.appState.currentUser = sel;
            window.saveState();
            window.syncUI();
        };

        window.checkUserType = function() {
            const sel = document.getElementById('userSelect').value;
            document.getElementById('userPasswordInput').classList.toggle('hidden', sel === 'VISITANTE' || sel === '');
        };

        // --- CONFIGURAÇÃO GIST ---
        window.abrirModalGist = function() {
            document.getElementById('modalGist').classList.remove('hidden');
            document.getElementById('gistTokenInput').value = window.gistConfig.token;
            document.getElementById('gistIdInput').value = window.gistConfig.id;
        };

        window.fecharModalGist = function() { document.getElementById('modalGist').classList.add('hidden'); };

        window.salvarConfigGist = async function() {
            window.gistConfig.token = document.getElementById('gistTokenInput').value.trim();
            window.gistConfig.id = document.getElementById('gistIdInput').value.trim();
            localStorage.setItem('reinfGistToken', window.gistConfig.token);
            localStorage.setItem('reinfGistId', window.gistConfig.id);
            
            const ok = await window.sincronizarDoGist();
            if (ok) {
                window.syncUI();
                window.fecharModalGist();
                alert("Nuvem sincronizada!");
            } else {
                alert("Falha ao conectar. Verifique Token e ID.");
            }
        };

        window.atualizarBotaoNuvem = function(ok) {
            const btn = document.getElementById('btnStatusNuvem');
            btn.className = ok ? "bg-emerald-100 text-emerald-800 px-3 py-1.5 rounded-full text-[10px] font-black border border-emerald-300" : "bg-slate-100 text-slate-500 px-3 py-1.5 rounded-full text-[10px] font-black border border-slate-300";
            document.getElementById('iconeNuvem').innerText = ok ? "✅" : "⚠️";
        };

        window.togglePainel = function(id) {
            document.getElementById(id).classList.toggle('painel-oculto');
        };

        // --- IMPORTAÇÃO ---
        window.adicionarDados = async function() {
            const raw = document.getElementById('rawData').value.trim();
            const mes = document.getElementById('mesRefInput').value.trim();
            if (!raw || !mes) return alert("Preencha o mês e cole os dados!");

            if (!window.appState.meses.includes(mes)) window.appState.meses.push(mes);
            
            const linhas = raw.split('\n');
            linhas.forEach(linha => {
                const cols = linha.split('\t');
                if (cols.length < 5) return;
                
                const razao = cols[2]?.toUpperCase();
                const cnpj = cols[3];
                const antec = cols[11] || '-';

                let cli = window.appState.clientes.find(c => c.cnpj === cnpj);
                if (!cli) {
                    cli = { razao, cnpj, mensal: {} };
                    window.appState.clientes.push(cli);
                }
                cli.mensal[mes] = { antec, lancado: '-', reinf: '-' };
            });

            document.getElementById('rawData').value = '';
            await window.saveState();
            window.renderTable();
            alert("Dados Processados!");
        };

        // INICIALIZAÇÃO
        window.onload = async () => {
            const local = localStorage.getItem('reinf_local_backup');
            if (local) window.appState = JSON.parse(local);
            if (window.gistConfig.token && window.gistConfig.id) await window.sincronizarDoGist();
            window.syncUI();
        };

    </script>
</body>
</html>
