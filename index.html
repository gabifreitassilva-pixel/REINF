<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha de Integrações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ajuste total à tela sem rolagem horizontal desnecessária */
        html, body { height: 100%; margin: 0; padding: 0; background-color: #f8fafc; }
        
        table { 
            border-collapse: collapse; 
            width: 100%; 
            table-layout: auto; 
        }
        
        th, td { 
            font-size: 10px; 
            padding: 4px 6px !important; 
            white-space: nowrap; 
            text-align: center;
            border: 1px solid #cbd5e1;
        }

        /* CONFIGURAÇÃO DE COLUNAS FIXAS */
        .col-fixed-n { width: 35px; min-width: 35px; max-width: 35px; }
        .col-fixed-ano { width: 45px; min-width: 45px; max-width: 45px; }
        .col-fixed-razao { width: 250px; min-width: 250px; max-width: 250px; text-align: left; overflow: hidden; text-overflow: ellipsis; }
        .col-fixed-cnpj { width: 130px; min-width: 130px; max-width: 130px; font-family: monospace; font-weight: bold; }
        .col-fixed-contato { width: 120px; min-width: 120px; max-width: 120px; text-align: left; overflow: hidden; text-overflow: ellipsis; }
        .col-fixed-regime { width: 50px; min-width: 50px; max-width: 50px; }

        /* Colunas dos meses dinâmicos */
        .col-month-data { min-width: 85px; }

        .filter-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            width: 100%;
            margin-top: 2px;
        }

        .filter-select {
            font-size: 9px;
            padding: 0px 2px;
            width: 100%;
            max-width: 80px; 
            border: 1px solid #94a3b8;
            background: white;
            border-radius: 2px;
            font-weight: normal;
            outline: none;
            color: #334155;
        }

        thead { position: sticky; top: 0; z-index: 20; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .painel-lateral { transition: transform 0.3s ease-in-out; }
        .painel-oculto { transform: translateX(100%); }

        /* Input de edição na célula */
        .cell-input {
            width: 100%;
            background: transparent;
            text-align: center;
            outline: none;
            font-weight: bold;
            border-radius: 2px;
        }
        .cell-input:focus { background: white; box-shadow: inset 0 0 0 1px #3b82f6; }
    </style>
</head>
<body class="font-sans overflow-hidden">

    <!-- Modal de Identificação -->
    <div id="modalUser" class="fixed inset-0 bg-slate-900 bg-opacity-80 flex justify-center items-center z-[100] hidden px-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm text-center border-t-4 border-blue-600">
            <h2 class="text-xl font-black mb-2 text-slate-800 uppercase tracking-tight">Acesso ao Sistema</h2>
            <p class="text-xs text-slate-500 mb-4 font-medium">Identifique-se para registrar suas alterações no log de auditoria.</p>
            <input type="text" id="userNameInput" class="w-full border-2 border-slate-200 p-3 rounded-lg mb-4 text-center font-bold text-lg focus:border-blue-500 outline-none uppercase" placeholder="SEU NOME">
            <button onclick="window.salvarUsuario()" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-6 py-3 rounded-lg w-full shadow-lg transition-all uppercase tracking-widest">Entrar na Planilha</button>
        </div>
    </div>

    <div class="h-screen flex flex-col relative bg-white">
        
        <!-- Cabeçalho Principal -->
        <div class="p-3 border-b border-slate-200 flex justify-between items-center bg-slate-50 flex-shrink-0 shadow-sm z-30">
            <h1 class="text-sm font-black text-slate-700 uppercase tracking-tighter flex items-center gap-2 leading-none">
                <span class="bg-blue-600 text-white p-1 rounded shadow-sm">PI</span>
                Controle de Integrações Reinf
            </h1>
            <div class="flex items-center gap-2">
                <div class="text-[10px] bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm font-bold flex items-center gap-2">
                    <span class="text-slate-400">USUÁRIO:</span> <span id="displayUserName" class="text-blue-600 uppercase"></span>
                    <button onclick="window.abrirLogin()" class="text-slate-300 hover:text-red-500 transition-colors" title="Alterar Usuário">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
                
                <button onclick="togglePainel('painelClassificacao')" class="bg-blue-100 hover:bg-blue-200 text-blue-900 px-4 py-1.5 rounded-full text-[10px] font-black border border-blue-300 transition-all leading-none flex items-center gap-2 shadow-sm">
                    📊 REINF: MENSAL/TRIMESTRAL
                </button>

                <button onclick="togglePainel('painelHistorico')" class="bg-amber-100 hover:bg-amber-200 text-amber-900 px-4 py-1.5 rounded-full text-[10px] font-black border border-amber-300 transition-all leading-none flex items-center gap-2 shadow-sm">
                    📋 LOG DE ATIVIDADES 
                    <span id="badgeHistorico" class="bg-amber-500 text-white rounded-full px-2 py-0.5 text-[10px]">0</span>
                </button>
            </div>
        </div>

        <!-- Área de Importação -->
        <div class="p-3 bg-blue-50 border-b border-blue-100 flex-shrink-0 relative z-10">
            <div class="flex gap-4 items-center">
                <div class="flex items-center gap-3 flex-shrink-0">
                    <label class="text-[10px] font-black text-blue-900 uppercase">Mês Ref:</label>
                    <input type="text" id="mesRefInput" placeholder="01/2026" class="w-24 border-2 border-blue-200 rounded-md px-3 py-2 text-xs font-black outline-none focus:border-blue-500 bg-white shadow-inner">
                </div>
                <div class="flex-grow">
                    <textarea id="rawData" rows="1" class="w-full border-2 border-blue-100 rounded-md px-4 py-2 text-xs outline-none focus:border-blue-400 resize-none font-medium h-10 leading-tight shadow-inner" placeholder="Cole aqui os dados copiados do seu sistema/Excel..."></textarea>
                </div>
                <div class="flex gap-2 flex-shrink-0">
                    <button onclick="adicionarDados()" class="bg-blue-600 text-white text-xs font-black py-2.5 px-6 rounded-md shadow-md hover:bg-blue-700 transition-all uppercase tracking-tighter">Processar</button>
                    <button onclick="limparTabela()" class="bg-white text-red-600 border-2 border-red-100 text-xs font-bold py-2.5 px-4 rounded-md hover:bg-red-50 transition-all uppercase tracking-tighter shadow-sm">Limpar</button>
                </div>
            </div>
        </div>
        
        <!-- Barra de Meses Ocultos -->
        <div id="barraMesesOcultos" class="bg-slate-100 border-b border-slate-200 p-2 px-4 flex-shrink-0 hidden items-center gap-3 shadow-inner">
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Períodos Ocultos:</span>
            <div id="listaMesesOcultos" class="flex gap-2 flex-wrap"></div>
        </div>

        <!-- Tabela -->
        <div class="overflow-auto flex-grow relative bg-white">
            <table id="mainTable">
                <thead id="tabelaHead" class="text-slate-700 uppercase bg-slate-100 border-b-2 border-slate-300 shadow-sm">
                    <!-- Dinâmico -->
                </thead>
                <tbody id="tabelaCorpo" class="divide-y divide-slate-100">
                    <!-- Dinâmico -->
                </tbody>
            </table>
        </div>

        <!-- Painel Lateral de Auditoria -->
        <div id="painelHistorico" class="painel-lateral painel-oculto absolute top-0 right-0 h-full w-80 bg-white shadow-2xl border-l border-slate-200 z-50 flex flex-col">
            <div class="p-4 bg-amber-50 border-b border-amber-200 flex justify-between items-center">
                <h2 class="text-sm font-black text-amber-900 uppercase tracking-tighter">Registro de Atividades (Log)</h2>
                <button onclick="togglePainel('painelHistorico')" class="text-slate-400 hover:text-black text-2xl font-light leading-none">&times;</button>
            </div>
            <div class="p-3 overflow-y-auto flex-grow bg-slate-50 font-mono" id="conteudoHistorico"></div>
            <div class="p-3 border-t border-slate-200 text-center bg-white">
                <button onclick="limparHistorico()" class="text-[10px] text-red-600 uppercase font-black hover:underline tracking-widest">Zerar Log</button>
            </div>
        </div>

        <!-- Painel Lateral de Classificação Reinf -->
        <div id="painelClassificacao" class="painel-lateral painel-oculto absolute top-0 right-0 h-full w-80 bg-white shadow-2xl border-l border-slate-200 z-50 flex flex-col">
            <div class="p-4 bg-blue-50 border-b border-blue-200 flex justify-between items-center">
                <h2 class="text-sm font-black text-blue-900 uppercase tracking-tighter">Classificação Reinf</h2>
                <button onclick="togglePainel('painelClassificacao')" class="text-slate-400 hover:text-black text-2xl font-light leading-none">&times;</button>
            </div>
            <div class="p-4 bg-slate-50 flex-shrink-0 border-b">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Selecione o Mês para Análise:</label>
                <select id="selectMesClassificacao" class="w-full border p-2 text-xs font-bold rounded mt-1 outline-none focus:ring-1 focus:ring-blue-500" onchange="window.renderClassificacao()">
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div class="p-3 overflow-y-auto flex-grow bg-slate-50" id="conteudoClassificacao">
                <p class="text-[9px] text-slate-400 text-center mt-10 uppercase italic">Selecione um mês para ver a classificação mensal/trimestral.</p>
            </div>
        </div>
    </div>

    <!-- Script Atualizado: Replica EXATA da lógica do DEFIS (IndexedDB Fallback + GetDoc) + Seleção de Usuário -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Variáveis de Estado da Aplicação
        window.appState = {
            meses: [], 
            mesesConfig: {},
            clientes: [],
            historicoGeral: [],
            filtros: {},
            currentUser: '' // Inicia vazio para pedir o nome
        };

        let db = null;
        let auth = null;
        let currentUserId = null;
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // ==========================================
        // PERSISTÊNCIA LOCAL (INDEXED DB - IGUAL DEFIS)
        // ==========================================
        window.salvarDadosLocais = async function(dados) {
            try {
                const dbLocal = await new Promise((resolve, reject) => {
                    const req = indexedDB.open("PlanilhaReinfDB", 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore("store");
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
                const tx = dbLocal.transaction("store", "readwrite");
                tx.objectStore("store").put(dados, "estado_geral");
            } catch(e) { console.warn("Erro ao salvar localmente", e); }
        };

        window.carregarDadosLocais = async function() {
            try {
                const dbLocal = await new Promise((resolve, reject) => {
                    const req = indexedDB.open("PlanilhaReinfDB", 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore("store");
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
                const tx = dbLocal.transaction("store", "readonly");
                const req = tx.objectStore("store").get("estado_geral");
                req.onsuccess = () => {
                    if(req.result) {
                        window.aplicarDados(req.result);
                    } else {
                        window.syncUI(); // Força render inicial
                    }
                };
            } catch(e) { 
                console.warn("Nenhum dado local encontrado", e); 
                window.syncUI();
            }
        };

        window.aplicarDados = function(data) {
            if (data) {
                window.appState = Object.assign(window.appState, data);
            }
            window.syncUI();
        };

        // ==========================================
        // INICIALIZAÇÃO UNIVERSAL
        // ==========================================
        const initApp = async () => {
            if (typeof __firebase_config !== 'undefined') {
                try {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    };
                    await initAuth();

                    onAuthStateChanged(auth, async (user) => {
                        if (user) { 
                            currentUserId = user.uid; 
                            await window.carregarDadosFirebase(); 
                        }
                    });
                } catch(e) { 
                    console.error("Firebase indisponível, ativando modo offline:", e);
                    await window.carregarDadosLocais();
                }
            } else {
                // Se o usuário baixou o HTML para rodar localmente
                await window.carregarDadosLocais();
            }
        };
        initApp();

        window.carregarDadosFirebase = async function() {
            if (!currentUserId || !db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'dados_reinf', 'estado_geral');
                const docSnap = await getDoc(docRef); // Usa getDoc para ler uma vez, em vez de escutar contínuo (evita resets fantasma)
                if (docSnap.exists()) {
                    window.aplicarDados(docSnap.data());
                } else {
                    // Nuvem vazia (usuário novo ou link aberto de novo), tenta puxar do histórico local
                    await window.carregarDadosLocais();
                }
            } catch(e) { 
                console.error("Erro ao carregar da nuvem. Puxando base local:", e);
                await window.carregarDadosLocais();
            }
        };

        window.saveState = async function() {
            const dadosParaSalvar = window.appState;
            
            // 1. Salva na Nuvem
            if (currentUserId && db) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'dados_reinf', 'estado_geral');
                    await setDoc(docRef, dadosParaSalvar);
                } catch(e) { 
                    console.error("Erro na nuvem. Salvando no PC local...", e); 
                }
            } 
            
            // 2. Sempre salva localmente também como backup blindado
            await window.salvarDadosLocais(dadosParaSalvar);
        };


        // ==========================================
        // FUNÇÕES GLOBAIS DA INTERFACE
        // ==========================================
        window.syncUI = function() {
            // Lógica de exibir o modal de login apenas se não houver usuário ou se for "VOCÊ" (da versão anterior)
            if (!window.appState.currentUser || window.appState.currentUser === 'VOCÊ') {
                window.abrirLogin();
            } else {
                document.getElementById('displayUserName').innerText = window.appState.currentUser;
                document.getElementById('modalUser').classList.add('hidden');
            }
            window.renderTable();
            window.renderHistorico();
            window.renderClassificacao();
        };

        window.abrirLogin = function() {
            document.getElementById('modalUser').classList.remove('hidden');
            if(window.appState.currentUser && window.appState.currentUser !== 'VOCÊ') {
                document.getElementById('userNameInput').value = window.appState.currentUser;
            }
            document.getElementById('userNameInput').focus();
        };

        window.salvarUsuario = async function() {
            let n = document.getElementById('userNameInput').value.trim();
            if (!n) return alert("Por favor, identifique-se.");
            window.appState.currentUser = n;
            await window.saveState(); // Salva estado
            window.syncUI();
        };

        // Permite salvar nome com Enter
        document.getElementById('userNameInput').addEventListener('keypress', function(e){
            if(e.key === 'Enter') window.salvarUsuario();
        });

        // Formatação automática da máscara de data
        document.getElementById('mesRefInput').addEventListener('blur', function(e) {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length === 6) {
                e.target.value = val.substring(0,2) + '/' + val.substring(2);
            }
        });

        window.togglePainel = function(id) { 
            // Fecha outros painéis abertos
            ['painelHistorico', 'painelClassificacao'].forEach(p => {
                if(p !== id) document.getElementById(p).classList.add('painel-oculto');
            });
            document.getElementById(id).classList.toggle('painel-oculto');
            if(id === 'painelClassificacao') window.renderClassificacao();
        };

        window.renderHistorico = function() {
            const container = document.getElementById('conteudoHistorico');
            document.getElementById('badgeHistorico').innerText = window.appState.historicoGeral.length;
            if (window.appState.historicoGeral.length === 0) {
                container.innerHTML = `<p class="text-[9px] text-slate-400 text-center mt-10 uppercase font-bold tracking-widest">Nenhum registro</p>`;
                return;
            }
            container.innerHTML = [...window.appState.historicoGeral].reverse().map(reg => `
                <div class="mb-3 bg-white p-2.5 rounded-lg border border-slate-200 text-[10px] shadow-sm">
                    <div class="flex justify-between items-center border-b border-slate-100 mb-2 pb-1.5">
                        <span class="text-blue-600 font-black uppercase tracking-tight">${reg.usuario}</span>
                        <div class="text-right leading-none">
                            <span class="text-slate-400 font-bold block">${reg.mes}</span>
                            <span class="text-slate-300 text-[8px]">${reg.data}</span>
                        </div>
                    </div>
                    ${reg.alteracoes.map(a => `<div class="text-slate-700 py-0.5 leading-tight">• ${a}</div>`).join('')}
                </div>
            `).join('');
        };

        window.renderClassificacao = function() {
            const container = document.getElementById('conteudoClassificacao');
            const selMes = document.getElementById('selectMesClassificacao');
            const mes = selMes.value;

            // Atualiza opções do select se necessário
            const currentOptions = Array.from(selMes.options).map(o => o.value);
            window.appState.meses.forEach(m => {
                if(!currentOptions.includes(m)) {
                    let opt = document.createElement('option');
                    opt.value = m; opt.text = m;
                    selMes.add(opt);
                }
            });

            if (!mes) return;

            let mensal = [];
            let trimestral = [];

            window.appState.clientes.forEach(cli => {
                if (cli.mensal[mes]) {
                    let vlr = window.parseCurrency(cli.mensal[mes].antec);
                    if (vlr > 50000) mensal.push(cli.razao);
                    else if (vlr > 0 || cli.mensal[mes].antec === 'S/M') trimestral.push(cli.razao);
                }
            });

            container.innerHTML = `
                <div class="mb-6">
                    <div class="bg-red-600 text-white text-[10px] font-black p-2 rounded shadow-md uppercase mb-2">Envio Mensal (>50k): ${mensal.length}</div>
                    <div class="space-y-1">
                        ${mensal.map(r => `<div class="bg-white border-l-4 border-red-500 p-1.5 text-[9px] font-bold text-slate-700 shadow-sm uppercase">${r}</div>`).join('')}
                        ${mensal.length === 0 ? '<p class="text-[9px] text-slate-400 italic">Nenhum cliente para este período.</p>' : ''}
                    </div>
                </div>
                <div>
                    <div class="bg-emerald-600 text-white text-[10px] font-black p-2 rounded shadow-md uppercase mb-2">Envio Trimestral (até 50k/SM): ${trimestral.length}</div>
                    <div class="space-y-1">
                        ${trimestral.map(r => `<div class="bg-white border-l-4 border-emerald-500 p-1.5 text-[9px] font-bold text-slate-700 shadow-sm uppercase">${r}</div>`).join('')}
                        ${trimestral.length === 0 ? '<p class="text-[9px] text-slate-400 italic">Nenhum cliente para este período.</p>' : ''}
                    </div>
                </div>
            `;
        };

        window.limparHistorico = async function() { 
            if(confirm("Zerar log?")) { 
                window.appState.historicoGeral = []; 
                await window.saveState(); // Salva estado
                window.renderHistorico(); 
            } 
        };

        window.setFiltro = async function(mes, campo, status) {
            if (!window.appState.filtros[mes]) window.appState.filtros[mes] = {};
            window.appState.filtros[mes][campo] = status;
            await window.saveState(); // Salva estado
            window.renderTable();
        };

        window.getUniqueValues = function(mes, campo) {
            const vals = new Set();
            window.appState.clientes.forEach(c => {
                let v = c.mensal[mes] ? c.mensal[mes][campo] : '-';
                if (v && v !== '-') vals.add(v.trim());
            });
            return Array.from(vals).sort();
        };

        window.parseCurrency = function(valStr) {
            if (!valStr || valStr === '-' || valStr === 'S/M') return 0;
            let clean = valStr.replace(/\./g, '').replace(',', '.');
            let num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        };

        window.renderTable = function() {
            const thead = document.getElementById('tabelaHead');
            const tbody = document.getElementById('tabelaCorpo');

            let tr1 = `<tr>
                <th rowspan="2" class="col-fixed-n text-slate-500">Nº</th>
                <th rowspan="2" class="col-fixed-ano text-slate-500">ANO</th>
                <th rowspan="2" class="col-fixed-razao text-slate-500">RAZÃO SOCIAL</th>
                <th rowspan="2" class="col-fixed-cnpj text-slate-500">CNPJ</th>
                <th rowspan="2" class="col-fixed-contato text-slate-500">CONTATO</th>
                <th rowspan="2" class="col-fixed-regime text-slate-500">REG.</th>`;
            
            let tr2 = `<tr>`;
            let hasVisible = false;

            window.appState.meses.forEach(mes => {
                let config = window.appState.mesesConfig[mes] || { visible: true, data: '', usuario: '' };
                if (config.visible) {
                    hasVisible = true;
                    let metaInfo = config.data ? `<div class="text-[8px] font-bold text-blue-500 lowercase leading-tight mt-1">Imp: ${config.data.split(' ')[0]} por <span class="uppercase">${config.usuario}</span></div>` : '';
                    
                    tr1 += `<th colspan="3" onclick="window.toggleMes('${mes}')" class="cursor-pointer hover:bg-red-50 border-b border-blue-200 bg-blue-100 text-blue-900 font-black tracking-tight" title="Clique para Ocultar">
                        MÊS: ${mes}${metaInfo}
                    </th>`;
                    
                    const f = window.appState.filtros[mes] || {};
                    const configCols = [
                        { campo: 'antec', nome: 'ANT', cor: 'bg-blue-50' },
                        { campo: 'lancado', nome: 'FOLHA', cor: 'bg-slate-50' },
                        { campo: 'reinf', nome: 'REINF', cor: 'bg-green-50' }
                    ];

                    configCols.forEach(cfg => {
                        let unique = window.getUniqueValues(mes, cfg.campo);
                        tr2 += `
                        <th class="col-month-data ${cfg.cor}">
                            <div class="filter-container">
                                <span class="font-black text-[10px] text-slate-700">${cfg.nome}</span>
                                <select class="filter-select" onclick="event.stopPropagation()" onchange="window.setFiltro('${mes}', '${cfg.campo}', this.value)">
                                    <option value="">TODOS</option>
                                    <option value="__VAZIO__" ${f[cfg.campo] === '__VAZIO__' ? 'selected' : ''}>(Vazio)</option>
                                    ${unique.map(v => `<option value="${v}" ${f[cfg.campo] === v ? 'selected' : ''}>${v}</option>`).join('')}
                                </select>
                            </div>
                        </th>`;
                    });
                }
            });
            tr1 += `</tr>`; tr2 += `</tr>`;
            
            if (window.appState.meses.length > 0 && !hasVisible) {
                tr1 += `<th colspan="20" class="text-center italic text-slate-400 py-6 uppercase font-black bg-slate-50 tracking-widest text-xs">Períodos ocultos na barra superior</th></tr>`;
                tr2 = ``;
            }
            thead.innerHTML = tr1 + tr2;

            let list = [...window.appState.clientes].sort((a, b) => a.razao.localeCompare(b.razao));
            
            window.appState.meses.forEach(m => {
                const f = window.appState.filtros[m];
                if (f) {
                    Object.keys(f).forEach(campo => {
                        if (f[campo] === '__VAZIO__') {
                            list = list.filter(c => !c.mensal[m] || !c.mensal[m][campo] || c.mensal[m][campo] === '-' || c.mensal[m][campo].trim() === '');
                        } else if (f[campo] !== '') {
                            list = list.filter(c => c.mensal[m] && c.mensal[m][campo] && c.mensal[m][campo].trim() === f[campo]);
                        }
                    });
                }
            });

            tbody.innerHTML = list.length === 0 ? `<tr><td colspan="100" class="text-center py-20 text-slate-300 uppercase font-black italic tracking-widest">Nenhum dado</td></tr>` : 
            list.map(cli => {
                let row = `<tr class="hover:bg-blue-50 border-b border-slate-100 transition-colors">
                    <td class="col-fixed-n font-mono text-slate-400 font-bold">${cli.n}</td>
                    <td class="col-fixed-ano text-slate-400 font-medium">${cli.ano}</td>
                    <td class="col-fixed-razao font-black text-slate-800 uppercase tracking-tighter" title="${cli.razao}">${cli.razao}</td>
                    <td class="col-fixed-cnpj font-mono text-blue-700 tracking-tighter">${cli.cnpj}</td>
                    <td class="col-fixed-contato text-slate-500 uppercase" title="${cli.contato}">${cli.contato}</td>
                    <td class="col-fixed-regime font-black text-slate-600 uppercase">${cli.regime}</td>`;
                
                window.appState.meses.forEach(m => {
                    if (window.appState.mesesConfig[m]?.visible) {
                        let d = cli.mensal[m] || { antec: '-', lancado: '-', reinf: '-' };
                        let cLancado = d.lancado.toUpperCase() === 'OK' ? 'text-blue-600 font-black' : (d.lancado.toUpperCase() === 'NT' ? 'text-emerald-600 font-black' : 'text-slate-400');
                        
                        // LÓGICA DE ALERTA > 50 MIL
                        let vlr = window.parseCurrency(d.antec);
                        let bgAntec = "bg-blue-50/20";
                        let fontAntec = "text-slate-900";
                        let badgeHtml = "";
                        
                        if (vlr > 50000) {
                            bgAntec = "bg-red-50"; fontAntec = "text-red-700";
                            badgeHtml = `<div class="text-[8px] bg-red-600 text-white rounded px-1.5 mt-0.5 inline-block font-black tracking-widest leading-tight shadow-sm">MENSAL >50k</div>`;
                        } else if (vlr > 0 || d.antec === 'S/M') {
                            bgAntec = "bg-emerald-50"; fontAntec = "text-emerald-800";
                            badgeHtml = `<div class="text-[8px] bg-emerald-500 text-white rounded px-1.5 mt-0.5 inline-block font-black tracking-widest leading-tight shadow-sm">TRIMESTRAL</div>`;
                        }

                        row += `
                            <td class="${bgAntec} font-black ${fontAntec} align-middle">
                                <div>${d.antec}</div>
                                ${badgeHtml}
                            </td>
                            <td class="align-middle">
                                <input type="text" class="cell-input ${cLancado}" value="${d.lancado}" onchange="window.atualizarCelulaManual('${cli.cnpj}', '${m}', 'lancado', this.value, '${d.lancado}')">
                            </td>
                            <td class="bg-green-50/20 align-middle">
                                <input type="text" class="cell-input text-emerald-700 uppercase" value="${d.reinf}" onchange="window.atualizarCelulaManual('${cli.cnpj}', '${m}', 'reinf', this.value, '${d.reinf}')">
                            </td>`;
                    }
                });
                return row + `</tr>`;
            }).join('');
            
            window.renderHiddenMonths();
        };

        window.renderHiddenMonths = function() {
            const barra = document.getElementById('barraMesesOcultos');
            const lista = document.getElementById('listaMesesOcultos');
            const ocultos = window.appState.meses.filter(m => window.appState.mesesConfig[m] && !window.appState.mesesConfig[m].visible);
            
            if (ocultos.length > 0) {
                barra.classList.remove('hidden');
                barra.classList.add('flex');
                lista.innerHTML = ocultos.map(m => {
                    let hasAntec = window.appState.clientes.some(c => {
                        let val = c.mensal[m]?.antec || '';
                        return (/\d/.test(val)) || val.toUpperCase().includes('S/M');
                    });
                    let hasFolha = window.appState.clientes.some(c => {
                        let val = c.mensal[m]?.lancado?.toUpperCase() || '';
                        return val === 'OK' || val === 'NT';
                    });
                    let tics = hasAntec && hasFolha ? " ✓✓" : (hasAntec ? " ✓" : "");
                    return `<button onclick="window.toggleMes('${m}')" class="bg-white border-2 border-blue-200 text-[10px] font-black px-3 py-1 rounded-md shadow-sm hover:border-blue-600 hover:bg-blue-50 transition-all uppercase tracking-tighter text-slate-700">
                        Restaurar ${m}<span class="text-emerald-500 font-black ml-1">${tics}</span>
                    </button>`;
                }).join('');
            } else {
                barra.classList.add('hidden');
                barra.classList.remove('flex');
            }
        };

        window.toggleMes = async function(m) { 
            window.appState.mesesConfig[m].visible = !window.appState.mesesConfig[m].visible; 
            await window.saveState(); // Salva estado
            window.renderTable(); 
        };

        window.atualizarCelulaManual = async function(cnpj, mes, campo, val, old) {
            let cli = window.appState.clientes.find(c => c.cnpj === cnpj);
            if (cli && cli.mensal[mes] && val !== old) {
                cli.mensal[mes][campo] = val;
                window.appState.historicoGeral.push({
                    data: new Date().toLocaleString('pt-BR'),
                    usuario: window.appState.currentUser, mes: mes,
                    alteracoes: [`<span class="text-blue-600 font-bold">EDIÇÃO MANUAL:</span> <b>${cli.razao}</b> - ${campo.toUpperCase()} mudou de '${old}' para '${val}'`]
                });
                
                await window.saveState(); // Salva estado

                window.renderHistorico();
                window.renderTable();
                window.renderClassificacao();
            }
        };

        window.adicionarDados = async function() {
            const input = document.getElementById('rawData').value;
            let mesRef = document.getElementById('mesRefInput').value.trim();
            
            if (!mesRef || !input.trim()) return alert("Mês inválido ou dados vazios.");

            if (!window.appState.meses.includes(mesRef)) {
                window.appState.meses.push(mesRef);
                window.appState.meses.sort((a, b) => {
                    let [ma, ya] = a.split('/'); let [mb, yb] = b.split('/');
                    return new Date(ya, ma-1) - new Date(yb, mb-1);
                });
            }
            
            const dataAtual = new Date().toLocaleString('pt-BR');
            window.appState.mesesConfig[mesRef] = { visible: true, data: dataAtual, usuario: window.appState.currentUser };

            const linhas = input.trim().split('\n');
            let mudancas = [];
            let qtdImportadas = 0;

            linhas.forEach(linha => {
                if (linha.toUpperCase().includes('INTEGRAÇOES')) return;
                const cols = linha.split('\t');
                if (cols.length < 5) return;
                
                let offset = cols[2] && /^\d{4}$/.test(cols[2].trim()) ? 1 : 0;
                let cnpj = cols[offset+3]?.trim();
                if (!cnpj || cnpj === 'CNPJ') return;
                
                qtdImportadas++;

                let cli = window.appState.clientes.find(c => c.cnpj === cnpj);
                if (!cli) {
                    cli = { 
                        n: cols[offset+0]?.trim(), ano: cols[offset+1]?.trim(), 
                        razao: cols[offset+2]?.trim(), cnpj, 
                        contato: cols[offset+4]?.trim(), regime: cols[offset+5]?.trim(), 
                        mensal: {} 
                    };
                    window.appState.clientes.push(cli);
                    mudancas.push(`Nova empresa cadastrada na planilha: <b>${cli.razao}</b>`);
                }
                
                let ant = cols[offset+11]?.trim() || '-';
                
                let old = cli.mensal[mesRef];
                if (old && old.antec !== ant && ant !== '-') {
                    mudancas.push(`<b>${cli.razao}</b>: Antecipação atualizada de '${old.antec}' para '${ant}'`);
                } else if ((!old || old.antec === '-') && ant !== '-') {
                    mudancas.push(`<b>${cli.razao}</b>: Antecipação inserida '${ant}'`);
                }
                
                cli.mensal[mesRef] = { 
                    antec: ant, 
                    lancado: old?.lancado || '-', 
                    reinf: old?.reinf || '-' 
                };
            });
            
            let resumoGeral = `<span class="text-emerald-600 font-bold">IMPORTAÇÃO (${qtdImportadas} empresas lidas):</span> Dados processados para ${mesRef}.`;
            
            window.appState.historicoGeral.push({ 
                data: dataAtual, 
                usuario: window.appState.currentUser, 
                mes: mesRef, 
                alteracoes: [resumoGeral, ...mudancas] 
            });
            
            await window.saveState(); // Salva estado

            document.getElementById('rawData').value = '';
            window.renderTable();
            window.renderHistorico();
            window.renderClassificacao();
        };

        window.limparTabela = async function() { 
            if(confirm("Apagar tudo?")) { 
                window.appState.meses = []; window.appState.clientes = []; window.appState.historicoGeral = []; 
                window.appState.mesesConfig = {}; window.appState.filtros = {}; 
                
                await window.saveState(); // Salva estado
                
                window.renderTable(); window.renderHistorico(); 
            } 
        };
    </script>
</body>
</html>
